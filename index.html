<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }
        #inputKey {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }
        #inputKey:focus {
            outline: none;
            border-color: #3b82f6;
        }
        #submitBtn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #submitBtn:hover {
            background: #2563eb;
        }
        .tip {
            margin-top: 1rem;
            text-align: center;
            font-size: 14px;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>密钥验证入口</h2>
        <input type="text" id="inputKey" placeholder="请输入访问密钥">
        <button id="submitBtn">确认跳转</button>
        <div class="tip" id="tip"></div>
    </div>

    <script>
        // 初始化本地模拟数据库
        const accessDB = {
            "11af": "https://www.com",
            "7a12": "https://www.cn"
        };
        // 将密钥库持久化存入localStorage模拟本地数据库
        if(!localStorage.getItem('accessKeyDB')) {
            localStorage.setItem('accessKeyDB', JSON.stringify(accessDB));
        }

        const inputEl = document.getElementById('inputKey');
        const submitBtn = document.getElementById('submitBtn');
        const tipEl = document.getElementById('tip');

        submitBtn.addEventListener('click', () => {
            const userInput = inputEl.value.trim().toLowerCase();
            const db = JSON.parse(localStorage.getItem('accessKeyDB'));
            
            if(db[userInput]) {
                tipEl.textContent = "验证通过，即将跳转...";
                // 1秒后跳转对应站点
                setTimeout(() => window.location.href = db[userInput], 1000);
            } else {
                tipEl.textContent = "无效密钥，请重新输入";
                inputEl.value = '';
            }
        });

        // 支持回车快捷提交
        inputEl.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') submitBtn.click();
        });
    </script>
</body>
</html>
